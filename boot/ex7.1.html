<!DOCTYPE html>
<html>

<head>

    <title>Bootstrap Typography</title>

    <link rel="stylesheet"
    href="bootstrap-5.3.8-dist/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <h1 class="display-1">
            Display Heading
        </h1>

        <p class="lead">
            This is a lead paragraph.
        </p>

        <p class="text-muted">
            This text is muted.
        </p>

        <p class="fw-bold">
            This text is bold.
        </p>

    </div>

</body>

</html>
