<!DOCTYPE html>
<html>

<head>

    <title>Reordering Columns</title>

    <link rel="stylesheet"
    href="bootstrap-5.3.8-dist/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <div class="row">

            <div class="col-md-6 order-md-2 bg-success text-white p-3">
                Column 1
            </div>

            <div class="col-md-6 order-md-1 bg-danger text-white p-3">
                Column 2
            </div>

        </div>

    </div>

</body>

</html>
