<!DOCTYPE html>
<html>

<head>

    <title>Profile Card</title>

    <link rel="stylesheet"
    href="bootstrap-5.3.8-dist/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <div class="card" style="width: 18rem;">

            <img src="https://via.placeholder.com/150"
            class="card-img-top">

            <div class="card-body">

                <h5 class="card-title">
                    Bala
                </h5>

                <p class="card-text">
                    Web Developer
                </p>

                <button class="btn btn-primary">
                    View Profile
                </button>

            </div>

        </div>

    </div>

</body>

</html>
