<!DOCTYPE html>
<html>

<head>

    <title>Button Groups</title>

    <link rel="stylesheet"
    href="bootstrap-5.3.8-dist/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <div class="btn-group mb-4">

            <button class="btn btn-primary">Left</button>

            <button class="btn btn-success">Middle</button>

            <button class="btn btn-danger">Right</button>

        </div>

        <div class="btn-group" role="group">

            <input type="checkbox" class="btn-check" id="btn1">

            <label class="btn btn-outline-primary" for="btn1">
                Toggle 1
            </label>

            <input type="checkbox" class="btn-check" id="btn2">

            <label class="btn btn-outline-success" for="btn2">
                Toggle 2
            </label>

        </div>

    </div>

</body>

</html>
